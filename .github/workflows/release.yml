# .github/workflows/release.yml
#
# ClaudeRTOS-Insight 자동 릴리즈 워크플로우
#
# 트리거: v* 형식의 태그 푸시 (e.g. v5.7.2)
#
# 필요 설정:
#   Settings → Actions → General → Workflow permissions
#   → "Read and write permissions" 선택 후 Save

name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: '릴리즈할 태그 (e.g. v5.7.2)'
        required: true
        default: ''

# Node.js 24 강제 적용 (actions/checkout, setup-python 경고 해소)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest

    steps:
      # ── 1. 체크아웃 ─────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      # ── 2. 태그·버전 확인 ───────────────────────────────────
      - name: Resolve version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
            if ! git rev-parse "refs/tags/${TAG}" &>/dev/null; then
              echo "::notice::태그 ${TAG} 없음 — 현재 커밋에 생성"
              git config user.name  "github-actions[bot]"
              git config user.email "github-actions[bot]@users.noreply.github.com"
              git tag "${TAG}"
              git push origin "${TAG}"
            fi
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#v}"
          FILE_VERSION="$(cat VERSION 2>/dev/null | tr -d '[:space:]')"

          echo "tag=${TAG}"         >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          if [[ "$VERSION" != "$FILE_VERSION" ]]; then
            echo "::warning::태그 ${TAG}와 VERSION 파일(${FILE_VERSION})이 다릅니다."
          fi
          echo "Tag=${TAG}  Version=${VERSION}  FILE=${FILE_VERSION}"

      # ── 3. Python 환경 ──────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # pyserial·numpy: 오프라인 검증에는 불필요 — 실패해도 계속
          pip install pyserial numpy \
            && echo "✅ 선택적 패키지 설치 완료" \
            || echo "::warning::선택적 패키지 설치 실패 (검증에 영향 없음)"

      # ── 4. 환경 진단 (실패 시 원인 파악용) ──────────────────
      - name: Diagnose environment
        run: |
          echo "── Python 경로 ──"
          which python3
          python3 --version

          echo "── 작업 디렉터리 ──"
          pwd && ls -la

          echo "── host/ 구조 ──"
          ls host/

          echo "── PYTHONPATH 테스트 ──"
          PYTHONPATH=host python3 -c "
          import sys
          print('sys.path:', sys.path[:4])
          try:
              import parsers.binary_parser as bp
              print('✅ parsers.binary_parser import OK')
          except ImportError as e:
              print('❌ import 실패:', e)
          try:
              import analysis.analyzer as az
              print('✅ analysis.analyzer import OK')
          except ImportError as e:
              print('❌ import 실패:', e)
          "

      # ── 5. Protocol 검증 ────────────────────────────────────
      - name: Run validation (Protocol + Level 2)
        id: validation
        run: |
          echo "── Protocol 검증 (48/48) ──"
          # 검증 스크립트를 PYTHONPATH와 함께 실행
          # 실패 시 전체 출력을 보여주고 종료
          set +e
          RESULT=$(PYTHONPATH=host python3 examples/integrated_demo.py --validate 2>&1)
          EXIT_CODE=$?
          set -e

          echo "$RESULT"

          if [[ $EXIT_CODE -ne 0 ]]; then
            echo "::error::검증 스크립트 자체가 오류로 종료됨 (exit $EXIT_CODE)"
            exit 1
          fi

          if echo "$RESULT" | grep -q "ALL CHECKS PASSED"; then
            SCORE=$(echo "$RESULT" | grep -oE '[0-9]+/[0-9]+ PASS' | tail -1)
            echo "proto_score=${SCORE}" >> "$GITHUB_OUTPUT"
            echo "✅ Protocol: ${SCORE}"
          else
            # 실패한 항목 추출해서 에러 메시지로 출력
            FAILED=$(echo "$RESULT" | grep "❌" || echo "(실패 항목 파싱 불가)")
            echo "::error::Protocol 검증 실패::\n${FAILED}"
            exit 1
          fi

          echo "── Level 2 검증 (45/45) ──"
          set +e
          L2_RESULT=$(PYTHONPATH=host python3 tests/level2/run_level2.py 2>&1)
          L2_EXIT=$?
          set -e

          echo "$L2_RESULT"

          if [[ $L2_EXIT -eq 0 ]] && echo "$L2_RESULT" | grep -q "ALL CHECKS PASSED"; then
            L2_SCORE=$(echo "$L2_RESULT" | grep -oE '[0-9]+/[0-9]+ PASS' | tail -1)
            echo "l2_score=${L2_SCORE}" >> "$GITHUB_OUTPUT"
            echo "✅ Level 2: ${L2_SCORE}"
          else
            echo "::warning::Level 2 검증 실패 (릴리즈는 계속 진행)"
          fi

      # ── 6. Release Notes 생성 ───────────────────────────────
      - name: Generate Release Notes
        id: notes
        run: |
          python3 release_notes.py \
            --version "${{ steps.version.outputs.version }}" \
            --github-output \
            --out RELEASE_NOTES.md

          echo "── Release Notes 미리보기 ──"
          head -20 RELEASE_NOTES.md

      # ── 7. 배포 아카이브 빌드 ───────────────────────────────
      - name: Build release archive
        id: archive
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARCHIVE="ClaudeRTOS-Insight-v${VERSION}.tar.gz"

          tar -czf "${ARCHIVE}" \
            --exclude='.git' \
            --exclude='*.pyc' \
            --exclude='__pycache__' \
            --exclude='.github' \
            --exclude='RELEASE_NOTES.md' \
            .

          SIZE=$(du -sh "${ARCHIVE}" | cut -f1)
          SHA=$(sha256sum "${ARCHIVE}" | cut -d' ' -f1)

          echo "archive=${ARCHIVE}" >> "$GITHUB_OUTPUT"
          echo "size=${SIZE}"       >> "$GITHUB_OUTPUT"
          echo "sha256=${SHA}"      >> "$GITHUB_OUTPUT"
          echo "✅ ${ARCHIVE} (${SIZE})  SHA256: ${SHA}"

          sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"

      # ── 8. GitHub Release 생성 + 업로드 ─────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.2.1
        with:
          tag_name:   ${{ steps.version.outputs.tag }}
          name:       "ClaudeRTOS-Insight ${{ steps.version.outputs.tag }}"
          body_path:  RELEASE_NOTES.md
          draft:      false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          files: |
            ${{ steps.archive.outputs.archive }}
            ${{ steps.archive.outputs.archive }}.sha256
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 9. 완료 요약 ────────────────────────────────────────
      - name: Summary
        if: always()
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          REPO="${{ github.repository }}"
          ARCHIVE="${{ steps.archive.outputs.archive }}"

          cat >> "$GITHUB_STEP_SUMMARY" << SUMMARY
          ## ClaudeRTOS-Insight v${VERSION}

          | 항목 | 값 |
          |------|-----|
          | 버전 | \`v${VERSION}\` |
          | Protocol | ${{ steps.validation.outputs.proto_score || '(실패)' }} |
          | Level 2  | ${{ steps.validation.outputs.l2_score  || '(실패)' }} |
          | 아카이브 | \`${ARCHIVE}\` (${{ steps.archive.outputs.size || '-' }}) |
          | SHA256 | \`${{ steps.archive.outputs.sha256 || '-' }}\` |

          🔗 [릴리즈 페이지](https://github.com/${REPO}/releases/tag/v${VERSION})
          SUMMARY
